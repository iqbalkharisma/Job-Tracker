<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="JobTrack — Track your job applications, interviews, and offers in one place. A modern, visual job application tracker." />
  <meta name="theme-color" content="#09090B" />
  <title>JobTrack — Job Application Tracker</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

  <script>
    // Universal Error Logger
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      const err = `Error: ${msg}\nURL: ${url}\nLine: ${lineNo}`;
      console.error(err);
      return false;
    };
  </script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css?v=2" />
  <link rel="stylesheet" href="css/base.css?v=2" />
  <link rel="stylesheet" href="css/layout.css?v=2" />
  <link rel="stylesheet" href="css/components.css?v=2" />
  <link rel="stylesheet" href="css/animations.css?v=2" />
</head>
<body>
  <div class="app" id="app">

    <!-- ========================
         HEADER
         ======================== -->
    <header class="header" role="banner">
      <div class="header__inner">
        <div class="header__logo">
          <img src="assets/logo.png" alt="Logo" class="header__logo-img" />
          JobTrack
        </div>
        <nav class="header__nav" role="navigation" aria-label="Main navigation">
          <button class="header__nav-btn is-active" data-view="dashboard" aria-label="Dashboard view">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:6px;"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>
            <span data-i18n="nav.dashboard">Dashboard</span>
          </button>
          <button class="header__nav-btn" data-view="board" aria-label="Kanban board view">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:6px;"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7.5 3v18M12 3v18M16.5 3v18"/></svg>
            <span data-i18n="nav.board">Board</span>
          </button>
          <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 8px;"></div>
          <button class="btn btn--icon" id="btn-theme-toggle" aria-label="Toggle Theme" title="Toggle Theme">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>
          <button class="btn btn--icon" id="btn-lang-toggle" aria-label="Toggle Language" title="Toggle Language" style="font-size: 12px; font-weight: bold; width: 40px;">
            EN
          </button>
        </nav>
      </div>
    </header>

    <!-- ========================
         MAIN CONTENT (Rendered by JS)
         ======================== -->
    <main class="main-content" id="main-content" role="main">
      <!-- Dynamic content injected here -->
    </main>

    <!-- ========================
         TOAST CONTAINER
         ======================== -->
    <div class="toast-container" id="toast-container" aria-live="polite"></div>

  </div>

  <!-- Bundled JavaScript -->
  <script src="js/bundle.js"></script>
</body>
</html>
